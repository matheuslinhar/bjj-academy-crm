<!DOCTYPE html>
<html>

<head>
 <title>BJJ Academy CRM</title>
 <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>BJJ Academy CRM</h1>

<!-- 🔐 LOGIN -->
<div id="login">
 <h2>Login</h2>
 <input id="email" placeholder="Email">
 <input id="senha" type="password" placeholder="Senha">
 <button onclick="login()">Entrar</button>
 <button onclick="register()">Criar aluno com login</button>
 <button onclick="logout()">Logout</button>
</div>

<!-- 🧠 APP (ESCONDIDO ATÉ LOGAR) -->
<div id="app" style="display:none;">

<h2>Dashboard</h2>
<div id="dashboard">
 <p>Total: <span id="total">0</span></p>
 <p>Ativos: <span id="ativos">0</span></p>
 <p>Inativos: <span id="inativos">0</span></p>
</div>

<h2>Estatísticas</h2>
<div class="grafico-container">
 <canvas id="graficoAlunos"></canvas>
</div>

<h2>Cadastrar Aluno</h2>

<input id="nome" placeholder="Nome">
<input id="faixa" placeholder="Faixa">
<input id="telefone" placeholder="Telefone">
<input id="plano" placeholder="Plano">
<input id="status" placeholder="Status">
<input id="data" type="date">

<button onclick="cadastrarAluno()">Salvar</button>

<h2>Lista de Alunos</h2>

<table border="1">
 <thead>
  <tr>
   <th>Nome</th>
   <th>Faixa</th>
   <th>Telefone</th>
   <th>Plano</th>
   <th>Status</th>
   <th>Data Matrícula</th>
   <th>Ações</th>
  </tr>
 </thead>

 <tbody id="listaAlunos"></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
